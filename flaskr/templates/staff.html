{% extends "dashboard.html" %}
{% block title %}Staff{% endblock title %}
{% block content %}
<div class="container my-3 text-center">
    <a class="px-4 py-2 bg-black rounded-lg text-white hover:bg-gray-400 hover:text-black space-x-2 radius-2" href="{{url_for('staff.add_staff')}}">Add User</a>
</div>
    <div class="overflow-x-auto my-8">
        <table class="md:min-w-full w-full table-fixed md:table-fixed bg-white border border-gray-200 rounded-lg shadow-lg">
            <!-- Table Head -->
            <thead>
                <tr class="bg-gray-200 text-gray-700 text-left uppercase text-sm">
                    <th class="px-6 py-3 border-b">#</th>
                    <th class="px-6 py-3 border-b">Emp ID</th>
                    <th class="px-6 py-3 border-b">Name</th>
                    <th class="px-6 py-3 border-b">Type</th>
                    <th class="px-6 py-3 border-b">Actions</th>
                </tr>
            </thead>
            <!-- Table Body -->
            <tbody>
                <!-- Row 1 -->
                 {% for staff in staff %}
                <tr class="hover:bg-gray-100">
                    <td class=" px-6 py-2 border-b text-gray-700">{{staff.staff_id}}</td>
                    <td class="truncate px-6 py-2 border-b text-gray-700"><a class="text-blue-900" href="{{url_for('staff.show_staff',id=staff.staff_id)}}">{{staff.emp_id}}</a></td>
                    <td class=" px-6 py-2 border-b text-gray-700">{{staff.name}}</td>
                    <td class="truncate px-6 py-2 border-b text-gray-700">{{staff.designation}}</td>
                    <td class="px-6 py-2 flex flex-col items-center space-y-1 md:flex-row border-b text-gray-700">
                        <a href="{{url_for('staff.show_staff',id=staff.staff_id)}}" class="bg-blue-500 text-white px-3 py-1 rounded-md hover:bg-blue-600">Show</a>
                    </td>
                </tr>
                {% endfor %}
                
            </tbody>
        </table>
    </div>



    
{% endblock content %}
